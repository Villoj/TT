<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF XP Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&display=swap');
        
        html, body {
            background: transparent !important;
            overflow: hidden;
        }
        
        body {
            font-family: 'Oxanium', sans-serif;
            min-height: 100vh;
            padding: 15px;
            color: #fff;
            user-select: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 30px);
            height: calc(100% - 30px);
        }
        
        .app-container {
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.92);
            border: 1px solid rgba(255, 70, 90, 0.4);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: rgba(255, 70, 90, 0.15);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: move;
            -webkit-app-region: drag;
        }
        
        .header * {
            -webkit-app-region: no-drag;
        }
        
        .title {
            font-size: 14px;
            font-weight: 700;
            color: #ff4660;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .title::before { content: '🚒 '; }
        
        .controls {
            display: flex;
            gap: 6px;
        }
        
        .ctrl-btn {
            width: 22px;
            height: 22px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        
        .ctrl-btn.min {
            background: rgba(255,200,50,0.3);
            color: #ffc832;
        }
        
        .ctrl-btn.max {
            background: rgba(92,184,92,0.3);
            color: #5cb85c;
        }
        
        .ctrl-btn.close {
            background: rgba(255,107,107,0.3);
            color: #ff6b6b;
        }
        
        .ctrl-btn:hover { opacity: 0.8; }
        
        .content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            position: relative;
        }
        
        .status {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }
        
        .status.ff { background: rgba(255, 70, 90, 0.3); color: #ff4660; }
        .status.other { background: rgba(255, 200, 50, 0.3); color: #ffc832; }
        
        .main-xp { text-align: center; margin: 15px 0; }
        
        .xp-value {
            font-size: 38px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 70, 90, 0.5);
            line-height: 1;
        }
        
        .xp-label {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            margin-top: 5px;
        }
        
        .progress-container { margin: 15px 0; }
        
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 6px;
        }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4660, #ff6b6b);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .goal-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }
        
        .stat-value { font-size: 18px; font-weight: 600; color: #fff; }
        .stat-value.highlight { color: #ff4660; }
        
        .stat-label {
            font-size: 8px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin-top: 3px;
        }
        
        .job-info {
            margin-top: 12px;
            padding: 10px;
            background: rgba(255, 70, 90, 0.1);
            border-radius: 6px;
        }
        
        .job-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
        }
        
        .job-label { color: rgba(255,255,255,0.6); }
        .job-value { color: #fff; font-weight: 600; }
        
        .not-ff {
            text-align: center;
            padding: 25px 15px;
            color: rgba(255,255,255,0.5);
        }
        
        .not-ff .icon { font-size: 35px; margin-bottom: 8px; }
        .not-ff .text { font-size: 11px; }
        
        .footer {
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .footer span { font-size: 8px; color: rgba(255,255,255,0.3); }
        
        .debug-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: rgba(255,255,255,0.4);
            padding: 3px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 8px;
        }
        
        .debug-panel {
            display: none;
            margin-top: 10px;
            padding: 8px;
            background: rgba(0,0,0,0.7);
            border-radius: 6px;
            font-size: 9px;
            max-height: 120px;
            overflow-y: auto;
        }
        
        .debug-panel.show { display: block; }
        
        .debug-row {
            padding: 2px 0;
            color: rgba(255,255,255,0.5);
            font-family: monospace;
            word-break: break-all;
        }
        
        .debug-row.exp { color: #5cb85c; }
        
        .instructions {
            margin-top: 10px;
            padding: 8px;
            background: rgba(255, 200, 50, 0.1);
            border-radius: 6px;
            font-size: 9px;
            color: rgba(255,200,50,0.8);
        }
        
        /* Resize handle */
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 15px;
            height: 15px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(255,70,90,0.5) 50%);
            border-radius: 0 0 12px 0;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="header" id="header">
            <div class="title">FF XP Tracker</div>
            <div class="controls">
                <button class="ctrl-btn min" onclick="minimize()" title="Minimize">_</button>
                <button class="ctrl-btn max" onclick="toggleMaximize()" title="Maximize">□</button>
                <button class="ctrl-btn close" onclick="closeApp()" title="Close">×</button>
            </div>
        </div>
        
        <div class="content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="status" id="jobStatus">Loading...</span>
            </div>
            
            <div id="ffContent">
                <div class="main-xp">
                    <div class="xp-value" id="xpValue">0</div>
                    <div class="xp-label">Firefighter XP</div>
                </div>
                
                <div class="progress-container">
                    <div class="progress-labels">
                        <span>0</span>
                        <span id="progressPercent">0%</span>
                        <span>1M</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                
                <div class="goal-info">
                    <div class="stat-box">
                        <div class="stat-value highlight" id="jobsRemaining">-</div>
                        <div class="stat-label">Jobs Left</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="xpRemaining">-</div>
                        <div class="stat-label">XP to Goal</div>
                    </div>
                </div>
                
                <div class="job-info">
                    <div class="job-row">
                        <span class="job-label">Current Job</span>
                        <span class="job-value" id="currentJob">-</span>
                    </div>
                    <div class="job-row" style="margin-top: 6px;">
                        <span class="job-label">User ID</span>
                        <span class="job-value" id="userId">-</span>
                    </div>
                </div>
            </div>
            
            <div id="notFF" class="not-ff" style="display: none;">
                <div class="icon">🔥</div>
                <div class="text">Switch to Firefighter job<br>to track XP</div>
            </div>
            
            <div class="footer">
                <span>Goal: 1,000,000 XP</span>
                <button class="debug-btn" onclick="toggleDebug()">🐛</button>
            </div>
            
            <div class="debug-panel" id="debugPanel">
                <div id="debugExp"></div>
            </div>
            
            <div class="instructions" id="instructions">
                <strong>Tip:</strong> Drag header to move • Click □ to maximize
            </div>
        </div>
        
        <div class="resize-handle" id="resizeHandle"></div>
    </div>

    <script>
        const GOAL_XP = 1000000;
        const DEFAULT_AVG_XP = 250;
        
        let playerData = {};
        let avgXP = DEFAULT_AVG_XP;
        let debugMode = false;
        let isMaximized = false;
        let originalSize = { width: 400, height: 350 };
        
        // Window controls
        function closeApp() {
            if (window.invoke) {
                window.invoke('close');
            } else {
                // Fallback: send close command
                fetch(`https://${window.location.host}/close`, { method: 'POST' }).catch(() => {});
            }
        }
        
        function minimize() {
            if (window.invoke) {
                window.invoke('pin');
            }
        }
        
        function toggleMaximize() {
            isMaximized = !isMaximized;
            const container = document.getElementById('appContainer');
            
            if (isMaximized) {
                container.style.position = 'fixed';
                container.style.top = '0';
                container.style.left = '0';
                container.style.width = '100%';
                container.style.height = '100%';
                container.style.borderRadius = '0';
                container.style.transform = 'none';
            } else {
                container.style.position = 'absolute';
                container.style.top = '50%';
                container.style.left = '50%';
                container.style.transform = 'translate(-50%, -50%)';
                container.style.width = '400px';
                container.style.height = '350px';
                container.style.borderRadius = '12px';
            }
        }
        
        // Initialize position (centered)
        window.addEventListener('load', function() {
            const container = document.getElementById('appContainer');
            container.style.position = 'absolute';
            container.style.top = '50%';
            container.style.left = '50%';
            container.style.transform = 'translate(-50%, -50%)';
            container.style.width = '400px';
            container.style.minHeight = '350px';
        });
        
        // Data listeners - multiple methods
        window.addEventListener('message', function(event) {
            handleData(event.data);
        });
        
        window.updateData = function(data) { handleData(data); };
        window.setData = function(data) { handleData(data); };
        window.onData = function(data) { handleData(data); };
        
        function handleData(data) {
            if (!data) return;
            
            let actualData = data;
            if (data.data) actualData = data.data;
            if (data.type === 'dataUpdate') actualData = data.data || data;
            if (data.type === 'data') actualData = data.data || data;
            
            if (typeof actualData === 'object') {
                playerData = { ...playerData, ...actualData };
                updateDisplay();
            }
        }
        
        function updateDisplay() {
            const userId = playerData.user_id || playerData.userId || '-';
            const jobName = playerData.job_name || playerData.job || '-';
            
            document.getElementById('userId').textContent = userId;
            document.getElementById('currentJob').textContent = jobName;
            
            const isFF = isFirefighter(playerData);
            
            document.getElementById('jobStatus').textContent = isFF ? 'FIREFIGHTER' : jobName;
            document.getElementById('jobStatus').className = 'status ' + (isFF ? 'ff' : 'other');
            
            document.getElementById('ffContent').style.display = isFF ? 'block' : 'none';
            document.getElementById('notFF').style.display = isFF ? 'none' : 'block';
            
            if (!isFF) return;
            
            const ffXP = getFFXP(playerData);
            
            if (ffXP > 0) {
                document.getElementById('xpValue').textContent = ffXP.toLocaleString();
                
                const xpRemaining = GOAL_XP - ffXP;
                const jobsRemaining = Math.ceil(xpRemaining / avgXP);
                const progress = Math.min((ffXP / GOAL_XP) * 100, 100);
                
                document.getElementById('xpRemaining').textContent = xpRemaining.toLocaleString();
                document.getElementById('jobsRemaining').textContent = jobsRemaining.toLocaleString();
                document.getElementById('progressPercent').textContent = progress.toFixed(1) + '%';
                document.getElementById('progressFill').style.width = progress + '%';
            }
            
            updateDebug();
        }
        
        function isFirefighter(data) {
            const job = (data?.job || '').toLowerCase();
            const jobName = (data?.job_name || '').toLowerCase();
            const subjob = (data?.subjob || '').toLowerCase();
            
            return job === 'firefighter' || jobName === 'firefighter' || 
                   job.includes('fire') || subjob.includes('fire');
        }
        
        function getFFXP(data) {
            if (!data) return 0;
            
            const expKeys = [];
            for (const key in data) {
                if (key.startsWith('exp_')) {
                    expKeys.push(`${key}: ${data[key]}`);
                }
            }
            
            const debugExpEl = document.getElementById('debugExp');
            debugExpEl.innerHTML = expKeys.length > 0 
                ? expKeys.map(k => `<div class="debug-row exp">${k}</div>`).join('')
                : '<div class="debug-row">No exp_ keys yet</div>';
            
            const possibleKeys = [
                'exp_job_firefighter',
                'exp_firefighter', 
                'firefighter_xp',
                'xp_firefighter',
                'ff_xp',
                'exp_group_firefighter',
                'exp_job_fire'
            ];
            
            for (const key of possibleKeys) {
                if (data[key] !== undefined) {
                    return parseInt(data[key]) || 0;
                }
            }
            
            for (const key in data) {
                const lowerKey = key.toLowerCase();
                if ((lowerKey.includes('fire') || lowerKey.includes('ff')) && 
                    (lowerKey.includes('xp') || lowerKey.includes('exp'))) {
                    return parseInt(data[key]) || 0;
                }
            }
            
            return 0;
        }
        
        function toggleDebug() {
            debugMode = !debugMode;
            document.getElementById('debugPanel').classList.toggle('show', debugMode);
            document.getElementById('instructions').style.display = debugMode ? 'none' : 'block';
        }
        
        function updateDebug() {
            if (!debugMode) return;
            
            const expKeys = [];
            for (const key in playerData) {
                if (key.startsWith('exp_')) {
                    expKeys.push(`${key}: ${playerData[key]}`);
                }
            }
            
            const debugExpEl = document.getElementById('debugExp');
            debugExpEl.innerHTML = expKeys.length > 0 
                ? expKeys.map(k => `<div class="debug-row exp">${k}</div>`).join('')
                : '<div class="debug-row">No exp_ keys found</div>';
        }
        
        // Poll for data every 2 seconds
        setInterval(() => {
            if (window.invoke) {
                window.invoke('getData');
            }
            if (debugMode) updateDebug();
        }, 2000);
    </script>
</body>
</html>
